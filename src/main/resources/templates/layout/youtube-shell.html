<th:block th:fragment="ytShellHead(pageTitle)">
  <meta name="yt-shell-page-title" th:content="${pageTitle}" content="Bideo shell" />
  <link rel="prefetch" href="../../static/vendor/youtube-shell/20260331/css/www-onepick.css" as="style" />
  <link rel="prefetch" href="../../static/vendor/youtube-shell/20260331/css/www-main-desktop-watch-page-skeleton.css" as="style" />
  <link rel="prefetch" href="../../static/vendor/youtube-shell/20260331/css/ytmainappweb-kevlar-base.css" as="style" />
  <link rel="stylesheet" href="../../static/css/layout/youtube-shell-overrides.css" />
</th:block>

<th:block th:fragment="ytShellChrome(activeItemKey)">
  <div class="yt-shell yt-shell--guide-open" data-yt-shell-root>
    <header class="yt-shell__masthead">
      <div class="yt-shell__masthead-start">
        <button
          class="yt-shell__icon-button"
          type="button"
          aria-label="탐색 전환"
          aria-expanded="false"
          data-yt-shell-menu-toggle
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 7H3V6h18v1zm0 5H3v-1h18v1zm0 5H3v-1h18v1z"></path>
          </svg>
        </button>
        <a class="yt-shell__brand" href="/" aria-label="Bideo 홈">
          <img src="../../static/images/logo.png" alt="Bideo" />
          <span class="yt-shell__brand-text">Bideo</span>
        </a>
      </div>

      <div class="yt-shell__masthead-center">
        <form class="yt-shell__search" action="#" method="get">
          <label class="yt-shell__search-field">
            <input type="search" name="q" placeholder="검색" aria-label="검색" />
          </label>
          <button class="yt-shell__search-submit" type="submit" aria-label="검색">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27.7-.7-4.27-4.27A6 6 0 0 0 10 4zm0 1a5 5 0 1 1 0 10a5 5 0 0 1 0-10z"></path>
            </svg>
          </button>
        </form>
      </div>

      <div class="yt-shell__masthead-end">
        <button
          class="yt-shell__icon-button yt-shell__icon-button--mobile"
          type="button"
          aria-label="검색 전환"
          aria-expanded="false"
          data-yt-shell-search-toggle
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27.7-.7-4.27-4.27A6 6 0 0 0 10 4zm0 1a5 5 0 1 1 0 10a5 5 0 0 1 0-10z"></path>
          </svg>
        </button>
        <button class="yt-shell__icon-button" type="button" aria-label="설정">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5Zm8 3h-1.57a6.96 6.96 0 0 0-.64-1.54l1.12-1.12-.7-.7-1.12 1.12a6.96 6.96 0 0 0-1.54-.64V7h-1v1.57a6.96 6.96 0 0 0-1.54.64L11.89 8.1l-.7.7 1.12 1.12c-.27.48-.49 1-.64 1.54H10v1h1.57c.15.54.37 1.06.64 1.54l-1.12 1.12.7.7 1.12-1.12c.48.27 1 .49 1.54.64V17h1v-1.57c.54-.15 1.06-.37 1.54-.64l1.12 1.12.7-.7-1.12-1.12c.27-.48.49-1 .64-1.54H20v-1Z"></path>
          </svg>
        </button>
        <a class="yt-shell__login" href="#">로그인</a>
      </div>
    </header>

    <div class="yt-shell__mobile-search" hidden data-yt-shell-mobile-search>
      <form class="yt-shell__mobile-search-form" action="#" method="get">
        <button
          class="yt-shell__icon-button"
          type="button"
          aria-label="검색 닫기"
          aria-expanded="false"
          data-yt-shell-search-toggle
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12z"></path>
          </svg>
        </button>
        <label class="yt-shell__mobile-search-field">
          <input type="search" name="q" placeholder="검색" aria-label="검색" />
        </label>
      </form>
    </div>

    <aside class="yt-shell__guide" aria-label="기본 탐색" data-yt-shell-guide>
      <nav class="yt-shell__guide-nav">
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'home'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5.69l5 4.5V19h-3v-5H10v5H7v-8.81l5-4.5zm0-1.35L5 10.56V20h6v-5h2v5h6V10.56l-7-6.22z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">홈</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'shorts'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 6.5a2.5 2.5 0 0 1 2.5-2.5H17v1h-4.5A1.5 1.5 0 0 0 11 6.5c0 .83.67 1.5 1.5 1.5H14a2.5 2.5 0 1 1 0 5h-4v-1h4a1.5 1.5 0 1 0 0-3h-1.5A2.5 2.5 0 0 1 10 6.5Zm-3 4L14.5 6v12L7 13.5V10.5z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">Shorts</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'subscriptions'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 18v-6l5 3-5 3zm9-12H5v12h14V6zm1-1v14H4V5h16zm-9-3l4 2H7l4-2z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">구독</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'you'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12.5A3.5 3.5 0 1 0 12 5.5A3.5 3.5 0 1 0 12 12.5Zm0 1c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4Z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">You</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'history'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 3a9 9 0 1 0 8.95 10h-1.01A8 8 0 1 1 13 4v4l4-3l-4-3v1Zm-1 5h1v5l4 2-.45.89L12 13.5V8Z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">시청 기록</span>
        </a>
      </nav>

      <div class="yt-shell__guide-meta">
        <a href="#">정보</a>
        <a href="#">저작권</a>
        <a href="#">문의하기</a>
        <a href="#">개인정보처리방침</a>
      </div>
    </aside>

    <aside class="yt-shell__drawer" aria-label="모바일 탐색" hidden data-yt-shell-drawer>
      <div class="yt-shell__drawer-header">
        <a class="yt-shell__brand yt-shell__brand--drawer" href="/" aria-label="Bideo 홈">
          <img src="../../static/images/logo.png" alt="Bideo" />
          <span class="yt-shell__brand-text">Bideo</span>
        </a>
      </div>
      <nav class="yt-shell__drawer-nav">
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'home'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5.69l5 4.5V19h-3v-5H10v5H7v-8.81l5-4.5zm0-1.35L5 10.56V20h6v-5h2v5h6V10.56l-7-6.22z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">홈</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'shorts'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 6.5a2.5 2.5 0 0 1 2.5-2.5H17v1h-4.5A1.5 1.5 0 0 0 11 6.5c0 .83.67 1.5 1.5 1.5H14a2.5 2.5 0 1 1 0 5h-4v-1h4a1.5 1.5 0 1 0 0-3h-1.5A2.5 2.5 0 0 1 10 6.5Zm-3 4L14.5 6v12L7 13.5V10.5z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">Shorts</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'subscriptions'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 18v-6l5 3-5 3zm9-12H5v12h14V6zm1-1v14H4V5h16zm-9-3l4 2H7l4-2z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">구독</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'you'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12.5A3.5 3.5 0 1 0 12 5.5A3.5 3.5 0 1 0 12 12.5Zm0 1c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4Z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">You</span>
        </a>
        <a class="yt-shell__guide-item" href="#" th:classappend="${activeItemKey == 'history'} ? ' is-active'">
          <span class="yt-shell__guide-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M13 3a9 9 0 1 0 8.95 10h-1.01A8 8 0 1 1 13 4v4l4-3l-4-3v1Zm-1 5h1v5l4 2-.45.89L12 13.5V8Z"></path>
            </svg>
          </span>
          <span class="yt-shell__guide-label">시청 기록</span>
        </a>
      </nav>
    </aside>

    <button class="yt-shell__overlay" type="button" hidden data-yt-shell-overlay aria-label="탐색 닫기"></button>
  </div>
</th:block>
